<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>bai3-vonglap</title>
</head>
<body>

    <h1>Bài 3 - Vòng lặp</h1>

    <script>

        // In các số từ 1 đến 20
        console.log("Các số từ 1 đến 20:");
        for (let i = 1; i <= 20; i++) {
            console.log(i);
        }

        // Tính tổng từ 1 đến 20
        let tong = 0;

        for (let i = 1; i <= 20; i++) {
            tong += i;
        }

        console.log("Tổng từ 1 đến 20 là:", tong);

        // In các số chẵn từ 1 đến 20
        console.log("Các số chẵn từ 1 đến 20:");

        for (let i = 1; i <= 20; i++) {
            if (i % 2 === 0) {
                console.log(i);
            }
        }

    </script>

</body>
</html>
