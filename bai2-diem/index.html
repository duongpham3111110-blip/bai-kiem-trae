<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>bai2-diem</title>
</head>
<body>

    <h1>Bài 2 - Xếp loại học lực</h1>

    <script>
        let diem = parseFloat(prompt("Nhập điểm:"));

        if (diem >= 8.0) {
            console.log("Giỏi");
        } else if (diem >= 6.5) {
            console.log("Khá");
        } else if (diem >= 5.0) {
            console.log("Trung bình");
        } else {
            console.log("Yếu");
        }
    </script>

</body>
</html>
